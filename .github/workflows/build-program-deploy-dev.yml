# This is a basic workflow to help you get started with Actions

name: Build Program CSVs and Deploy to Demo

# Controls when the workflow will run
on:

  # schedule:  # conserve my actions quota!
  #   - cron: '0 * * * *'

  push:
    branches: [ "demo" ]
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:



# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
          
      ####### Buid the program csvs ###################
                      
      - name: "get files"
        run: curl -L -o "program.xlsx" "https://docs.google.com/uc?export=download&id=${{ secrets.PROGRAM_FILE_ID }}"
    
      - name: "check all good"
        run: ls -R
    
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # caching pip dependencies
      - run: pip install -r requirements.txt
      - run: python create_program_csvs.py
        
      - name: check it's there
        run: ls -R
        
      ####### Buid the website ###################

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1 # v1.195.0
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
          working-directory: tmd_conference

      - name: Build with Jekyll
        run: |
          cd tmd_conference
          bundle exec jekyll build --baseurl "dcuenvoieuriewud2dhfhf" -d "../dcuenvoieuriewud2dhfhf"
          cd ..
        env:
          JEKYLL_ENV: production

      - name: check for errors!
        run: git status -uno --porcelain
        
      - name: check it's there
        run: ls -R
        
      ####### Deploy the website ###################
        
      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_ADDRESS }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: "${{ secrets.PASSWORD }}"
          local_path: dcuenvoieuriewud2dhfhf/
          # known-hosts: ssh-rsa 
          remote_path: /
          
          
        
          

            
            
