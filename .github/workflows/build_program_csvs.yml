# This is a basic workflow to help you get started with Actions

name: Build Program CSVs

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
    fetch:
        name: "Fetch the program xlsx from google drive"
        runs-on: ubuntu-latest
        
        steps:
            - name: "get files"
              run: curl -L -o "program.xlsx" "https://docs.google.com/uc?export=download&id=${{ secrets.PROGRAM_FILE_ID }}"
            
            - name: "check all good"
              run: ls -R
  
    create:
        name: "Generate the csv files from xlsx"
    # The type of runner that the job will run on
        runs-on: ubuntu-latest
        
        needs: fetch

        # Steps represent a sequence of tasks that will be executed as part of the job
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-python@v4
              with:
                python-version: '3.9'
                cache: 'pip' # caching pip dependencies
            - run: pip install -r requirements.txt
            - run: python create_program_csvs.py

            - name: check for errors!
              run: git status -uno --porcelain

            - name: check it's there
              run: ls -R
